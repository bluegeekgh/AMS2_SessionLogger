name: Build AMS2_SessionLogger (Windows)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC environment
        run: |
          call "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" x64

      - name: Build with cl.exe
        run: |
          mkdir build
          cl /nologo /EHsc /std:c++17 /O2 src\*.cpp /I include /Fe:build\AMS2_SessionLogger.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AMS2_SessionLogger
          path: build\AMS2_SessionLogger.exe
